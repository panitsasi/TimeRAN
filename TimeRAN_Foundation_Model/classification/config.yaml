backend: TimeRAN   
variant: base
mode: full_finetuning
lora: false
batch_size: 32
epochs: 5
init_lr: 1e-5
max_lr: 1e-4
max_norm: 5
agg: mean
reduction: mean
seed: 77
device: 0

dataset:
  class: TelecomTS         
  data: ../data/datasets/TelecomTS
  train_ratio: 0.7
  task:
    name: classification
    target: congestion
  seq_len: 512
  stride: 32
  horizon: None